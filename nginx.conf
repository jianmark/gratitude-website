# Gratitude Marketing Website — Internal nginx config
# Serves Astro static build with i18n prefix routing (/it/, /en/, /de/, /fr/, /es/)

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml;

    # Root redirect to default locale (Italian)
    location = / {
        return 302 /it/;
    }

    # i18n locale prefixed paths — serve static files with fallback
    location ~ ^/(it|en|de|fr|es)/ {
        try_files $uri $uri/ $uri/index.html /$1/404/index.html =404;
    }

    # Bare locale without trailing slash — redirect to add it
    location ~ ^/(it|en|de|fr|es)$ {
        return 301 $uri/;
    }

    # Static assets — long cache (Astro hashes filenames)
    location ~* \.(js|css|woff2?|ttf|eot|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Images — moderate cache
    location ~* \.(jpg|jpeg|png|gif|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # HTML files — no cache for freshness
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }

    # Sitemap and robots
    location ~* ^/(sitemap.*\.xml|robots\.txt)$ {
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    # 404 fallback
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
