<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F0F4F8"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1B3A5C" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background transparent -->

  <!-- Title area -->
  <text x="400" y="42" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">Integrazione Nativa con Passepartout Welcome</text>
  <text x="400" y="60" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Sincronizzazione in tempo reale tramite API WebHawk / REST</text>

  <!-- LEFT: Gratitude Card -->
  <rect x="40" y="86" width="300" height="440" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#cardShadow)"/>

  <!-- Gratitude header -->
  <rect x="40" y="86" width="300" height="50" rx="14" fill="#059669"/>
  <rect x="40" y="122" width="300" height="14" fill="#059669"/>
  <!-- Logo -->
  <rect x="58" y="96" width="30" height="30" rx="6" fill="#FFFFFF"/>
  <text x="67" y="117" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#059669">G</text>
  <text x="98" y="108" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Gratitude TMS</text>
  <text x="98" y="124" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#FFFFFF" opacity="0.8">Tip Management System</text>

  <!-- Features list -->
  <text x="60" y="162" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#0F172A">Funzionalita</text>

  <!-- Feature items -->
  <circle cx="68" cy="184" r="4" fill="#059669"/>
  <text x="80" y="188" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155">Tablet checkout con mance</text>

  <circle cx="68" cy="206" r="4" fill="#059669"/>
  <text x="80" y="210" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155">QR Code multi-touchpoint</text>

  <circle cx="68" cy="228" r="4" fill="#059669"/>
  <text x="80" y="232" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155">Mance nominative per staff</text>

  <circle cx="68" cy="250" r="4" fill="#059669"/>
  <text x="80" y="254" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155">Distribuzione automatica</text>

  <circle cx="68" cy="272" r="4" fill="#059669"/>
  <text x="80" y="276" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155">Dashboard e report fiscali</text>

  <circle cx="68" cy="294" r="4" fill="#059669"/>
  <text x="80" y="298" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155">Guest feedback e rating</text>

  <!-- Separator -->
  <line x1="60" y1="316" x2="320" y2="316" stroke="#F1F5F9" stroke-width="1"/>

  <!-- Data flows sent -->
  <text x="60" y="338" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#059669">Dati inviati a Passepartout</text>

  <rect x="60" y="348" width="260" height="24" rx="5" fill="#ECFDF5"/>
  <text x="72" y="364" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#059669">Addebito mancia &#8594; Conto camera (Art.15 Esente)</text>

  <rect x="60" y="378" width="260" height="24" rx="5" fill="#ECFDF5"/>
  <text x="72" y="394" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#059669">Mancia nominativa &#8594; MANCIA_NOM + nome staff</text>

  <rect x="60" y="408" width="260" height="24" rx="5" fill="#ECFDF5"/>
  <text x="72" y="424" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#059669">Storno mancia &#8594; Addebito negativo automatico</text>

  <!-- Tech stack -->
  <text x="60" y="456" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#94A3B8">TECNOLOGIA</text>
  <rect x="60" y="464" width="66" height="18" rx="4" fill="#F1F5F9"/>
  <text x="93" y="476" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#64748B" text-anchor="middle">Node.js 20</text>
  <rect x="132" y="464" width="66" height="18" rx="4" fill="#F1F5F9"/>
  <text x="165" y="476" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#64748B" text-anchor="middle">TypeScript</text>
  <rect x="204" y="464" width="66" height="18" rx="4" fill="#F1F5F9"/>
  <text x="237" y="476" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#64748B" text-anchor="middle">PostgreSQL</text>
  <rect x="60" y="488" width="66" height="18" rx="4" fill="#F1F5F9"/>
  <text x="93" y="500" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#64748B" text-anchor="middle">Redis</text>
  <rect x="132" y="488" width="66" height="18" rx="4" fill="#F1F5F9"/>
  <text x="165" y="500" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#64748B" text-anchor="middle">Docker</text>
  <rect x="204" y="488" width="66" height="18" rx="4" fill="#F1F5F9"/>
  <text x="237" y="500" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#64748B" text-anchor="middle">React 18</text>

  <!-- CENTER: Connection arrows -->
  <!-- Arrow right: Gratitude to Passepartout -->
  <line x1="350" y1="225" x2="440" y2="225" stroke="#059669" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="440,221 452,225 440,229" fill="#059669"/>
  <text x="396" y="218" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="600" fill="#059669" text-anchor="middle">Addebiti</text>
  <text x="396" y="238" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">API REST</text>

  <!-- Arrow left: Passepartout to Gratitude -->
  <line x1="440" y1="305" x2="350" y2="305" stroke="#1B3A5C" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="350,301 338,305 350,309" fill="#1B3A5C"/>
  <text x="396" y="296" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="600" fill="#1B3A5C" text-anchor="middle">Prenotazioni</text>
  <text x="396" y="318" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">WebHawk</text>

  <!-- Outbox pattern indicator -->
  <rect x="360" y="354" width="80" height="44" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="400" y="370" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="600" fill="#92400E" text-anchor="middle">Outbox Pattern</text>
  <text x="400" y="382" font-family="Inter, system-ui, sans-serif" font-size="6" fill="#B45309" text-anchor="middle">Nessuna mancia</text>
  <text x="400" y="392" font-family="Inter, system-ui, sans-serif" font-size="6" fill="#B45309" text-anchor="middle">va mai persa</text>

  <!-- RIGHT: Passepartout Card -->
  <rect x="460" y="86" width="300" height="440" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#cardShadow)"/>

  <!-- Passepartout header -->
  <rect x="460" y="86" width="300" height="50" rx="14" fill="#1B3A5C"/>
  <rect x="460" y="122" width="300" height="14" fill="#1B3A5C"/>

  <!-- PMS icon -->
  <rect x="478" y="96" width="30" height="30" rx="6" fill="#FFFFFF"/>
  <text x="486" y="117" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1B3A5C">P</text>
  <text x="518" y="108" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Passepartout</text>
  <text x="518" y="124" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#FFFFFF" opacity="0.8">Welcome PMS</text>

  <!-- PMS Features -->
  <text x="480" y="162" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#0F172A">Dati disponibili via API</text>

  <circle cx="488" cy="184" r="4" fill="#1B3A5C"/>
  <text x="500" y="188" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155">Prenotazioni e anagrafica ospiti</text>

  <circle cx="488" cy="206" r="4" fill="#1B3A5C"/>
  <text x="500" y="210" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155">Conti camera e folios</text>

  <circle cx="488" cy="228" r="4" fill="#1B3A5C"/>
  <text x="500" y="232" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155">Addebiti e dettaglio spese</text>

  <circle cx="488" cy="250" r="4" fill="#1B3A5C"/>
  <text x="500" y="254" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155">Reparti e articoli contabili</text>

  <circle cx="488" cy="272" r="4" fill="#1B3A5C"/>
  <text x="500" y="276" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155">Esenzione IVA Art.15 DPR 633/72</text>

  <circle cx="488" cy="294" r="4" fill="#1B3A5C"/>
  <text x="500" y="298" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155">Export dati per Mexal</text>

  <!-- Separator -->
  <line x1="480" y1="316" x2="740" y2="316" stroke="#F1F5F9" stroke-width="1"/>

  <!-- PMS data received -->
  <text x="480" y="338" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#1B3A5C">Dati ricevuti da Gratitude</text>

  <rect x="480" y="348" width="260" height="24" rx="5" fill="#EFF6FF"/>
  <text x="492" y="364" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#1E40AF">Prenotazione &#8594; Nome, Camera, Date, Totali</text>

  <rect x="480" y="378" width="260" height="24" rx="5" fill="#EFF6FF"/>
  <text x="492" y="394" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#1E40AF">Addebiti &#8594; Dettaglio spese per categoria</text>

  <rect x="480" y="408" width="260" height="24" rx="5" fill="#EFF6FF"/>
  <text x="492" y="424" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#1E40AF">Trattamento &#8594; Tipo pensione e servizi inclusi</text>

  <!-- Passepartout versions -->
  <text x="480" y="456" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#94A3B8">COMPATIBILITA</text>
  <rect x="480" y="464" width="86" height="18" rx="4" fill="#F1F5F9"/>
  <text x="523" y="476" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#64748B" text-anchor="middle">Welcome Hotel</text>
  <rect x="572" y="464" width="86" height="18" rx="4" fill="#F1F5F9"/>
  <text x="615" y="476" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#64748B" text-anchor="middle">Mexal / Pascom</text>
  <rect x="480" y="488" width="86" height="18" rx="4" fill="#F1F5F9"/>
  <text x="523" y="500" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#64748B" text-anchor="middle">WebHawk API</text>
  <rect x="572" y="488" width="86" height="18" rx="4" fill="#F1F5F9"/>
  <text x="615" y="500" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#64748B" text-anchor="middle">REST API</text>

  <!-- Bottom: sync indicator -->
  <rect x="200" y="545" width="400" height="36" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <circle cx="224" cy="563" r="5" fill="#22C55E"/>
  <text x="236" y="560" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#0F172A">Sincronizzazione attiva</text>
  <text x="236" y="572" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#94A3B8">Ultima comunicazione: 2 secondi fa | Latenza: 45ms | Circuit Breaker: CLOSED</text>
</svg>
