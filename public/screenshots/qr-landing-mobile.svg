<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F0F4F8"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <filter id="phoneShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#1B3A5C" flood-opacity="0.2"/>
    </filter>
    <clipPath id="phoneScreen">
      <rect x="296" y="52" width="208" height="450" rx="4"/>
    </clipPath>
  </defs>

  <!-- Background transparent -->

  <!-- iPhone frame -->
  <rect x="280" y="30" width="240" height="492" rx="32" fill="#1C1C1E" filter="url(#phoneShadow)"/>
  <rect x="283" y="33" width="234" height="486" rx="30" fill="#2C2C2E"/>
  <!-- Dynamic island -->
  <rect x="360" y="40" width="80" height="22" rx="11" fill="#1C1C1E"/>
  <!-- Screen -->
  <rect x="294" y="48" width="212" height="458" rx="6" fill="#F9FAFB"/>

  <g clip-path="url(#phoneScreen)">

    <!-- Header -->
    <rect x="294" y="48" width="212" height="48" fill="#1B3A5C"/>
    <!-- Logo -->
    <rect x="310" y="60" width="22" height="22" rx="5" fill="#FFFFFF"/>
    <text x="316" y="76" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#1B3A5C">G</text>
    <text x="340" y="74" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF">Gratitude</text>
    <!-- Lang -->
    <text x="472" y="74" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#FFFFFF" opacity="0.6" text-anchor="end">IT &#9662;</text>

    <!-- Content area -->
    <rect x="294" y="96" width="212" height="410" fill="#F9FAFB"/>

    <!-- Staff photo circle -->
    <circle cx="400" cy="142" r="36" fill="#ECFDF5" stroke="#FFFFFF" stroke-width="3"/>
    <text x="400" y="147" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#059669" text-anchor="middle">MB</text>

    <!-- Name and hotel -->
    <text x="400" y="196" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#1E293B" text-anchor="middle">Lascia una mancia per</text>
    <text x="400" y="214" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1B3A5C" text-anchor="middle">Marco B.</text>
    <text x="400" y="232" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Hotel Aurora Palace</text>

    <!-- Tip amount buttons - 2x2 grid -->
    <!-- 2 EUR -->
    <rect x="310" y="250" width="86" height="48" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="353" y="280" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#1B3A5C" text-anchor="middle">&#8364;2</text>

    <!-- 5 EUR -->
    <rect x="404" y="250" width="86" height="48" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="447" y="280" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#1B3A5C" text-anchor="middle">&#8364;5</text>

    <!-- 10 EUR (selected) -->
    <rect x="310" y="306" width="86" height="48" rx="10" fill="#1B3A5C"/>
    <text x="353" y="336" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">&#8364;10</text>

    <!-- 20 EUR -->
    <rect x="404" y="306" width="86" height="48" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="447" y="336" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#1B3A5C" text-anchor="middle">&#8364;20</text>

    <!-- Star rating section -->
    <text x="400" y="382" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">Come valuti il servizio?</text>
    <!-- Stars -->
    <text x="345" y="404" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#F59E0B">&#9733;</text>
    <text x="365" y="404" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#F59E0B">&#9733;</text>
    <text x="385" y="404" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#F59E0B">&#9733;</text>
    <text x="405" y="404" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#F59E0B">&#9733;</text>
    <text x="425" y="404" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#E2E8F0">&#9733;</text>

    <!-- Confirm button -->
    <rect x="310" y="420" width="180" height="40" rx="10" fill="#1B3A5C"/>
    <text x="400" y="444" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Conferma &#8364;10</text>

    <!-- Payment info -->
    <text x="400" y="474" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">Addebitato sul conto camera</text>

    <!-- Footer -->
    <rect x="294" y="492" width="212" height="16" fill="#F9FAFB"/>
    <text x="400" y="501" font-family="Inter, system-ui, sans-serif" font-size="6" fill="#CBD5E1" text-anchor="middle">Gratitude — Digital Tipping by SG Informatica</text>

  </g>

  <!-- Home indicator -->
  <rect x="365" y="510" width="70" height="4" rx="2" fill="#555" opacity="0.4"/>

  <!-- Decorative QR code illustration on the left side -->
  <g transform="translate(80, 180)">
    <!-- QR frame -->
    <rect width="120" height="120" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <!-- QR pattern (simplified) -->
    <rect x="16" y="16" width="26" height="26" rx="4" fill="#1B3A5C"/>
    <rect x="20" y="20" width="18" height="18" rx="2" fill="#FFFFFF"/>
    <rect x="24" y="24" width="10" height="10" rx="1" fill="#1B3A5C"/>

    <rect x="78" y="16" width="26" height="26" rx="4" fill="#1B3A5C"/>
    <rect x="82" y="20" width="18" height="18" rx="2" fill="#FFFFFF"/>
    <rect x="86" y="24" width="10" height="10" rx="1" fill="#1B3A5C"/>

    <rect x="16" y="78" width="26" height="26" rx="4" fill="#1B3A5C"/>
    <rect x="20" y="82" width="18" height="18" rx="2" fill="#FFFFFF"/>
    <rect x="24" y="86" width="10" height="10" rx="1" fill="#1B3A5C"/>

    <!-- Inner QR dots -->
    <rect x="50" y="16" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="60" y="16" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="50" y="26" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="16" y="50" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="26" y="50" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="50" y="50" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="60" y="50" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="70" y="50" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="98" y="50" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="50" y="60" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="78" y="60" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="50" y="70" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="60" y="70" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="78" y="78" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="88" y="78" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="98" y="78" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="78" y="88" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="98" y="88" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="78" y="98" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="88" y="98" width="6" height="6" rx="1" fill="#1B3A5C"/>
    <rect x="98" y="98" width="6" height="6" rx="1" fill="#1B3A5C"/>
  </g>
  <!-- Scan arrow -->
  <text x="140" y="328" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">Scan QR</text>
  <path d="M140 334 L 140 360 L 200 360" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
  <polygon points="200,356 210,360 200,364" fill="#94A3B8"/>

  <!-- Right side: card tent mockup -->
  <g transform="translate(570, 160)">
    <rect width="140" height="90" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="14" y="12" width="20" height="20" rx="4" fill="#1B3A5C"/>
    <text x="20" y="27" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">G</text>
    <text x="42" y="22" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#1B3A5C">Gratitude</text>
    <text x="42" y="32" font-family="Inter, system-ui, sans-serif" font-size="6" fill="#94A3B8">Hotel Aurora Palace</text>
    <!-- Mini QR -->
    <rect x="44" y="42" width="52" height="42" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="0.5"/>
    <rect x="52" y="50" width="10" height="10" rx="2" fill="#1B3A5C"/>
    <rect x="66" y="50" width="10" height="10" rx="2" fill="#1B3A5C"/>
    <rect x="80" y="50" width="10" height="10" rx="2" fill="#1B3A5C"/>
    <rect x="52" y="64" width="10" height="10" rx="2" fill="#1B3A5C"/>
    <rect x="66" y="64" width="10" height="10" rx="2" fill="#1B3A5C"/>
    <rect x="80" y="64" width="10" height="10" rx="2" fill="#1B3A5C"/>
  </g>
  <text x="640" y="268" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">QR Card</text>

  <!-- Second card: tent stand -->
  <g transform="translate(570, 310)">
    <rect width="140" height="80" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="70" y="20" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="#1B3A5C" text-anchor="middle">Lascia una mancia</text>
    <text x="70" y="32" font-family="Inter, system-ui, sans-serif" font-size="7" fill="#94A3B8" text-anchor="middle">Scansiona il QR code</text>
    <!-- Mini QR -->
    <rect x="46" y="38" width="48" height="36" rx="4" fill="#F1F5F9"/>
    <rect x="54" y="44" width="8" height="8" rx="1" fill="#1B3A5C"/>
    <rect x="66" y="44" width="8" height="8" rx="1" fill="#1B3A5C"/>
    <rect x="78" y="44" width="8" height="8" rx="1" fill="#1B3A5C"/>
    <rect x="54" y="56" width="8" height="8" rx="1" fill="#1B3A5C"/>
    <rect x="66" y="56" width="8" height="8" rx="1" fill="#1B3A5C"/>
  </g>
  <text x="640" y="408" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#64748B" text-anchor="middle">Tent Stand</text>
</svg>
