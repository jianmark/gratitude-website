<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F0F4F8"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="primaryBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B3A5C"/>
      <stop offset="1" stop-color="#15304D"/>
    </linearGradient>
    <clipPath id="screenClip">
      <rect x="195" y="62" width="410" height="466" rx="4"/>
    </clipPath>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#1B3A5C" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background transparent -->

  <!-- iPad outer frame -->
  <rect x="170" y="35" width="460" height="530" rx="36" fill="#2C2C2E" filter="url(#shadow)"/>
  <rect x="173" y="38" width="454" height="524" rx="34" fill="#1C1C1E"/>

  <!-- iPad screen area -->
  <rect x="193" y="58" width="414" height="474" rx="6" fill="#FFFFFF"/>

  <!-- Home indicator -->
  <rect x="350" y="546" width="100" height="4" rx="2" fill="#555" opacity="0.5"/>

  <!-- Content clipped to screen -->
  <g clip-path="url(#screenClip)">

    <!-- Header bar: navy with Gratitude branding -->
    <rect x="193" y="58" width="414" height="60" fill="#1B3A5C"/>
    <!-- G logo box -->
    <rect x="213" y="72" width="32" height="32" rx="6" fill="#FFFFFF"/>
    <text x="222" y="95" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#1B3A5C">G</text>
    <!-- Branding text -->
    <text x="254" y="84" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.7">Gratitude</text>
    <text x="254" y="100" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Hotel Aurora Palace</text>
    <!-- Language flags -->
    <text x="530" y="92" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.6">IT</text>
    <rect x="548" y="82" width="1" height="14" fill="#FFFFFF" opacity="0.2"/>
    <text x="558" y="92" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.4">EN</text>
    <text x="580" y="92" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.4">DE</text>

    <!-- Main content area -->
    <rect x="193" y="118" width="414" height="356" fill="#FFFFFF"/>

    <!-- Title -->
    <text x="220" y="150" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#1B3A5C">Seleziona la mancia</text>
    <text x="220" y="170" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8">L'importo verra aggiunto al conto camera</text>

    <!-- Bill total info card -->
    <rect x="220" y="185" width="360" height="44" rx="10" fill="#F0F6FC"/>
    <text x="240" y="210" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748B">Totale conto</text>
    <text x="530" y="212" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#1B3A5C" text-anchor="end">€166,00</text>

    <!-- Percentage tip buttons row -->
    <!-- 5% button -->
    <rect x="220" y="244" width="112" height="72" rx="14" fill="#F0F6FC" stroke="#1B3A5C" stroke-width="1.5"/>
    <text x="276" y="274" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#1B3A5C" text-anchor="middle">5%</text>
    <text x="276" y="298" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">€8,30</text>

    <!-- 10% button (selected state) -->
    <rect x="344" y="244" width="112" height="72" rx="14" fill="#1B3A5C"/>
    <text x="400" y="274" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">10%</text>
    <text x="400" y="298" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.8" text-anchor="middle">€16,60</text>

    <!-- 15% button -->
    <rect x="468" y="244" width="112" height="72" rx="14" fill="#F0F6FC" stroke="#1B3A5C" stroke-width="1.5"/>
    <text x="524" y="274" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#1B3A5C" text-anchor="middle">15%</text>
    <text x="524" y="298" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">€24,90</text>

    <!-- Fixed amount buttons row -->
    <!-- €5 -->
    <rect x="220" y="328" width="84" height="50" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
    <text x="262" y="358" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#334155" text-anchor="middle">€5</text>

    <!-- €10 -->
    <rect x="312" y="328" width="84" height="50" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
    <text x="354" y="358" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#334155" text-anchor="middle">€10</text>

    <!-- €20 -->
    <rect x="404" y="328" width="84" height="50" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
    <text x="446" y="358" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#334155" text-anchor="middle">€20</text>

    <!-- Custom -->
    <rect x="496" y="328" width="84" height="50" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
    <text x="538" y="358" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#334155" text-anchor="middle">Altro</text>

    <!-- Selected tip amount display -->
    <rect x="310" y="392" width="180" height="36" rx="8" fill="#ECFDF5"/>
    <text x="400" y="415" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#059669" text-anchor="middle">Mancia: €16,60</text>

    <!-- Continue button -->
    <rect x="220" y="440" width="360" height="50" rx="12" fill="url(#primaryBtn)"/>
    <text x="400" y="470" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">Continua</text>

    <!-- No tip link -->
    <text x="400" y="510" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94A3B8" text-anchor="middle">No grazie, non desidero lasciare una mancia</text>

    <!-- Footer -->
    <rect x="193" y="514" width="414" height="18" fill="#F8FAFC"/>
    <text x="400" y="526" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#94A3B8" text-anchor="middle">Powered by Gratitude | SG Informatica</text>

  </g>
</svg>
